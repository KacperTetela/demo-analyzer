spring.application.name=DemAnalyzer

spring.servlet.multipart.max-file-size=1024MB
spring.servlet.multipart.max-request-size=1024MB

server.tomcat.connection-timeout=300000
server.tomcat.keep-alive-timeout=300000

jwt.secret=${JWT_SECRET}

# default 15 minutes
jwt.access.expiration.ms=${JWT_ACCESS_EXPIRATION:900000}

# default 7 days
jwt.refresh.expiration.ms=${JWT_REFRESH_EXPIRATION:604800000}

# PostgreSQL connection
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA Settings
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:create}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Server port
server.port=${SPRING_PORT:8080}
server.error.include-stacktrace=never

# Parser service URL
parser.service.url=${PARSER_SERVICE_URL}

# CORS settings
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}